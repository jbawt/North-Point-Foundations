# Publishes the Vite production build (./dist) with GitHub’s official Pages Actions.
#
# Cache-Control (PageSpeed “Use efficient cache lifetimes”):
#   GitHub Pages always serves static files with max-age=600 (10 minutes). You cannot
#   change that from this repo. To get long-lived caching for /assets/* (hashed JS/CSS),
#   either:
#   • Deploy the same dist to Netlify (netlify.toml), Vercel (vercel.json), or
#     Cloudflare Pages (public/_headers is copied into dist/), or
#   • Put a custom domain on this site and use Cloudflare (or another CDN) with cache
#     rules that set a long browser TTL for paths matching /assets/ (and your repo base).
#
# REQUIRED setup (this avoids “white page” / /src/main.tsx — that happens when Pages
# serves the repo SOURCE from `main` instead of a built site):
#
#   Repo → Settings → Pages → Build and deployment
#   Source: GitHub Actions  (← NOT “Deploy from a branch”)
#
# After the first successful run, the site URL is shown on the workflow run and on the Pages settings.
# Project URL shape: https://<owner>.github.io/<repo>/

name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-actions
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build for GitHub Pages
        env:
          VITE_MAPBOX_ACCESS_TOKEN: ${{ secrets.VITE_MAPBOX_ACCESS_TOKEN }}
        run: |
          REPO="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$REPO" = "$OWNER.github.io" ]; then
            export GITHUB_PAGES_BASE="/"
          else
            export GITHUB_PAGES_BASE="/$REPO/"
          fi
          echo "GITHUB_PAGES_BASE=$GITHUB_PAGES_BASE"
          npm run build:gh-pages

      - name: Show built index.html (must reference /assets, not /src)
        run: head -n 40 dist/index.html

      - name: Ensure production build
        run: |
          if grep -q 'src/main.tsx' dist/index.html; then
            echo "::error::dist still has dev entry — Vite build broken."
            exit 1
          fi
          if ! grep -qE '/assets/[^"]+\.(js|mjs)' dist/index.html; then
            echo "::error::dist/index.html missing /assets/*.js"
            exit 1
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
