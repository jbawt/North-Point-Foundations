# Build and deploy the Vite SPA to GitHub Pages.
# Repo → Settings → Pages → Source: GitHub Actions.
#
# Project site: https://<owner>.github.io/<repo>/
# User/org site: repo named <owner>.github.io → base path is /

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build for GitHub Pages
        run: |
          REPO="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$REPO" = "$OWNER.github.io" ]; then
            export GITHUB_PAGES_BASE="/"
          else
            export GITHUB_PAGES_BASE="/$REPO/"
          fi
          echo "GITHUB_PAGES_BASE=$GITHUB_PAGES_BASE"
          npm run build:gh-pages

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
