# Build and deploy the Vite SPA to GitHub Pages.
#
# IMPORTANT — Pages must use THIS workflow’s artifact, not “Deploy from a branch”.
# If you publish the repo root, browsers load /src/main.tsx (dev entry) → white page + MIME errors.
#
# Setup: Repo → Settings → Pages → Build and deployment → Source: GitHub Actions.
# Visit the PROJECT URL: https://<owner>.github.io/<repo>/  (include the repo name in the path).
#
# Project site: https://<owner>.github.io/<repo>/
# User/org site: repo named <owner>.github.io → base path is /

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build for GitHub Pages
        run: |
          REPO="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$REPO" = "$OWNER.github.io" ]; then
            export GITHUB_PAGES_BASE="/"
          else
            export GITHUB_PAGES_BASE="/$REPO/"
          fi
          echo "GITHUB_PAGES_BASE=$GITHUB_PAGES_BASE"
          npm run build:gh-pages

      - name: Ensure dist is a production build (not dev index.html)
        run: |
          if grep -q 'src/main.tsx' dist/index.html; then
            echo "::error::dist/index.html still references dev entry — build misconfigured."
            exit 1
          fi
          if ! grep -qE '/assets/[^"]+\.(js|mjs)' dist/index.html; then
            echo "::error::dist/index.html has no /assets/*.js bundle — check Vite build output."
            exit 1
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
