# Builds the Vite app and force-pushes ONLY ./dist to branch "githubpages".
#
# GitHub Pages: Settings → Pages → Build and deployment
#   Source: Deploy from a branch
#   Branch: githubpages
#   Folder: / (root)
#
# Push to `main` or `master` to run this workflow. It overwrites `githubpages` with the
# production build. Do not point Pages at `main` — that serves dev index.html (/src/main.tsx).
#
# Live URL (project repo): https://<owner>.github.io/<repo>/

name: Deploy to githubpages branch

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: githubpages-branch-deploy
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build for GitHub Pages
        run: |
          REPO="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$REPO" = "$OWNER.github.io" ]; then
            export GITHUB_PAGES_BASE="/"
          else
            export GITHUB_PAGES_BASE="/$REPO/"
          fi
          echo "GITHUB_PAGES_BASE=$GITHUB_PAGES_BASE"
          npm run build:gh-pages

      - name: Show built index.html (debug)
        run: head -n 40 dist/index.html

      - name: Ensure dist is a production build
        run: |
          if grep -q 'src/main.tsx' dist/index.html; then
            echo "::error::dist/index.html still references dev entry."
            exit 1
          fi
          if ! grep -qE '/assets/[^"]+\.(js|mjs)' dist/index.html; then
            echo "::error::dist/index.html has no /assets/*.js bundle."
            exit 1
          fi

      - name: Push dist to branch githubpages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: githubpages
          publish_dir: ./dist
          force_orphan: true
          commit_message: 'deploy: production build'

  verify-githubpages:
    needs: build-and-publish
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: githubpages
          fetch-depth: 1

      - name: Verify githubpages has production index (not dev main.tsx)
        run: |
          echo "---- index.html (first 40 lines) ----"
          head -n 40 index.html
          echo "--------------------------------------"
          if grep -q 'src/main.tsx' index.html; then
            echo "::error::Branch githubpages still has DEV index. Fix: Settings → Pages → source branch = githubpages (not main)."
            exit 1
          fi
          if ! grep -qE '/assets/[^"]+\.(js|mjs)' index.html; then
            echo "::error::No hashed JS bundle in index.html on githubpages."
            exit 1
          fi
          echo "OK: githubpages branch contains a production index.html"
