# Builds the Vite app and pushes ONLY ./dist to branch "githubpages".
#
# GitHub Pages setup:
#   Settings → Pages → Build and deployment → Source: Deploy from a branch
#   Branch: githubpages  /  Folder: / (root)
#
# Do not commit source files to githubpages — that branch must contain the production
# build (index.html + /assets), or the site will load /src/main.tsx and stay white.
#
# Live URL (project repo): https://<owner>.github.io/<repo>/
# User site repo (<owner>.github.io): https://<owner>.github.io/

name: Deploy to githubpages branch

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: githubpages-branch-deploy
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build for GitHub Pages
        run: |
          REPO="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$REPO" = "$OWNER.github.io" ]; then
            export GITHUB_PAGES_BASE="/"
          else
            export GITHUB_PAGES_BASE="/$REPO/"
          fi
          echo "GITHUB_PAGES_BASE=$GITHUB_PAGES_BASE"
          npm run build:gh-pages

      - name: Ensure dist is a production build
        run: |
          if grep -q 'src/main.tsx' dist/index.html; then
            echo "::error::dist/index.html still references dev entry."
            exit 1
          fi
          if ! grep -qE '/assets/[^"]+\.(js|mjs)' dist/index.html; then
            echo "::error::dist/index.html has no /assets/*.js bundle."
            exit 1
          fi

      - name: Push dist to branch githubpages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: githubpages
          publish_dir: ./dist
          force_orphan: true
