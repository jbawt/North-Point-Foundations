<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon_io/favicon-32x32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="North Point Foundations — locally owned foundation repair and waterproofing in Central Alberta. Serving Lacombe, Red Deer, Blackfalds, Sylvan Lake, Innisfail, Olds, Ponoka, and surrounding areas. Waterproofing, crack repair, weeping tile, sump systems, window wells, excavation. Honest pricing, reliable service."
    />
    <meta name="theme-color" content="#1a1a1a" />
    <script>
      (function () {
        try {
          var m = localStorage.getItem('npf-theme');
          var sys = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = m === 'dark' || (m !== 'light' && sys);
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Merriweather:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <title>North Point Foundations | Foundation repair & waterproofing | Central Alberta</title>
  </head>
  <body>
    <!-- Netlify parses this at build time to enable the quote-request form + notifications -->
    <form name="quote-request" netlify netlify-honeypot="bot-field" hidden>
      <input name="bot-field" />
      <input name="from_name" />
      <input name="reply_to" />
      <input name="user_email" />
      <input name="phone" />
      <input name="property_address" />
      <input name="problem_category" />
      <input name="problem_category_id" />
      <input name="work_timeline" />
      <input name="project_summary" />
      <input name="message" />
    </form>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
